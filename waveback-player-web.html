<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waveback Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Young+Serif&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#120d0a; --panel:#201711; --panel-2:#281d15; --ink:#f5ead0; --muted:rgba(245,234,208,.58); --dim:rgba(245,234,208,.34); --line:rgba(245,234,208,.13); --gold:#e9a23b; --orange:#d9652b; --rose:#a93358; }
    * { box-sizing:border-box; }
    body { margin:0; min-width:320px; background:radial-gradient(circle at 15% 10%,#321f13 0,transparent 30%),var(--bg); color:var(--ink); font-family:'Nunito Sans',sans-serif; }
    button,input { font:inherit; }
    button { cursor:pointer; }
    .shell { max-width:1240px; min-height:100vh; margin:auto; padding:28px; }
    header { display:flex; justify-content:space-between; align-items:center; gap:20px; border-bottom:1px solid var(--line); padding-bottom:20px; }
    .brand { font-family:'Young Serif',serif; letter-spacing:.32em; font-size:19px; }
    .brand span { color:var(--gold); }
    .tagline { color:var(--muted); font-size:12px; letter-spacing:.12em; }
    .your-music { display:inline-flex; align-items:center; gap:9px; border:1px solid var(--line); border-radius:999px; padding:10px 14px; background:var(--panel); color:var(--ink); font-family:'Young Serif',serif; font-size:11px; letter-spacing:.15em; }
    .your-music:hover { border-color:rgba(233,162,59,.65); color:var(--gold); }
    main { display:grid; grid-template-columns:minmax(0,1.25fr) minmax(310px,.75fr); gap:24px; padding-top:26px; }
    .card { border:1px solid var(--line); border-radius:24px; background:linear-gradient(145deg,rgba(40,29,21,.92),rgba(28,20,16,.92)); box-shadow:0 20px 50px rgba(0,0,0,.2); }
    .player { padding:34px; min-height:670px; display:flex; flex-direction:column; align-items:center; }
    .eyebrow { color:var(--dim); font-size:10px; font-weight:800; letter-spacing:.27em; }
    .mode-row { display:grid; grid-template-columns:repeat(3,1fr); width:100%; max-width:560px; gap:8px; margin:22px 0 16px; }
    .mode { border:0; background:transparent; color:var(--muted); padding:8px 4px; text-align:center; font-size:10px; font-weight:800; letter-spacing:.1em; }
    .mode.active { color:var(--gold); }
    .mode i { display:block; margin:0 auto 7px; width:38px; height:38px; border-radius:50%; border:1px solid currentColor; opacity:.95; }
    .record { position:relative; display:grid; place-items:center; width:min(39vw,310px); aspect-ratio:1; margin:6px 0 23px; border-radius:50%; background:repeating-radial-gradient(circle,#1b120e 0 8px,#302016 9px 11px,#1b120e 12px 18px); box-shadow:inset 0 0 0 2px rgba(245,234,208,.09),0 22px 45px rgba(0,0,0,.45); }
    .record:before { content:''; position:absolute; inset:11%; border-radius:50%; border:16px solid var(--rose); border-left-color:var(--orange); border-right-color:var(--gold); opacity:.96; }
    .record:after { content:''; position:absolute; width:116px; aspect-ratio:1; border-radius:50%; background:linear-gradient(145deg,#e8a23b,#a93358); box-shadow:0 0 0 7px #1c1410; }
    .record .play { position:relative; z-index:1; width:58px; height:58px; border:0; border-radius:50%; background:var(--ink); color:var(--bg); font-size:21px; padding-left:5px; }
    .record.spinning { animation:spin 8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .song-title { font-family:'Young Serif',serif; font-size:29px; text-align:center; }
    .song-artist { margin-top:3px; color:var(--muted); font-size:14px; }
    .pill { margin-top:13px; padding:6px 12px; border:1px solid rgba(233,162,59,.42); border-radius:999px; color:var(--gold); font-size:10px; font-weight:800; letter-spacing:.16em; }
    .timeline { width:100%; max-width:560px; margin-top:25px; }
    input[type=range] { width:100%; accent-color:var(--gold); }
    .times { display:flex; justify-content:space-between; color:var(--muted); font-size:11px; font-weight:700; }
    .era-row { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; width:100%; max-width:560px; margin-top:25px; }
    .era { padding:13px 8px; border:1px solid var(--line); border-radius:14px; background:transparent; color:var(--muted); font-family:'Young Serif',serif; font-size:12px; letter-spacing:.09em; }
    .era small { display:block; margin-top:4px; font-family:'Nunito Sans',sans-serif; font-size:9px; color:var(--dim); letter-spacing:.12em; }
    .era.active,.era:hover { border-color:var(--gold); color:var(--gold); background:rgba(233,162,59,.08); }
    .library { padding:23px; min-height:670px; display:flex; flex-direction:column; }
    .library-head { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    h2 { margin:0; font-family:'Young Serif',serif; font-size:19px; font-weight:400; letter-spacing:.08em; }
    .count { color:var(--dim); font-size:11px; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:20px 0 12px; }
    .action { display:flex; justify-content:center; align-items:center; gap:7px; border:1px solid var(--line); border-radius:12px; padding:11px 8px; background:var(--panel-2); color:var(--ink); font-size:11px; font-weight:800; letter-spacing:.08em; }
    .action.search { color:var(--gold); border-color:rgba(233,162,59,.55); background:rgba(233,162,59,.09); }
    .searchbar { display:none; width:100%; border:1px solid var(--line); border-radius:12px; padding:11px 12px; background:transparent; color:var(--ink); outline:none; margin-bottom:10px; }
    .searchbar.visible { display:block; }
    .songs { overflow-y:auto; max-height:470px; padding-right:4px; }
    .songs::-webkit-scrollbar { width:7px; } .songs::-webkit-scrollbar-thumb { background:var(--line); border-radius:9px; }
    .song { width:100%; display:grid; grid-template-columns:42px minmax(0,1fr) auto; align-items:center; gap:11px; border:0; border-bottom:1px solid var(--line); padding:12px 5px; background:transparent; color:var(--ink); text-align:left; }
    .song:hover,.song.selected { background:rgba(233,162,59,.08); }
    .art { display:grid; place-items:center; width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--rose)); color:#1c1410; font-size:16px; }
    .song strong { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:'Young Serif',serif; font-weight:400; font-size:15px; }
    .song span { display:block; margin-top:2px; color:var(--muted); font-size:11px; }
    .song time { color:var(--muted); font-size:11px; font-weight:700; }
    .empty { padding:30px 0; text-align:center; color:var(--muted); }
    .note { margin-top:auto; padding-top:18px; color:var(--dim); font-size:11px; line-height:1.5; }
    #files { display:none; }
    @media (max-width:820px) { .shell { padding:18px; } header { align-items:flex-start; } .tagline { display:none; } main { grid-template-columns:1fr; } .player,.library { min-height:auto; } .record { width:min(70vw,310px); } .songs { max-height:330px; } }
    @media (max-width:440px) { .brand { font-size:15px; } .your-music { padding:9px 10px; font-size:9px; } .player { padding:24px 17px; } .library { padding:20px 16px; } .era { font-size:10px; } }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div><div class="brand">WAVE<span>BACK</span></div><div class="tagline">ONE SLIDER · SEVENTY YEARS OF SOUND</div></div>
      <button class="your-music" id="musicButton">♫ YOUR MUSIC</button>
    </header>
    <main>
      <section class="card player">
        <div class="eyebrow">TIME UP ↑</div>
        <div class="mode-row"><button class="mode"><i></i>CLEAN</button><button class="mode active"><i></i>MASTER</button><button class="mode"><i></i>ULTRA</button></div>
        <div class="record" id="record"><button class="play" id="play" aria-label="Play song">▶</button></div>
        <div class="song-title" id="nowTitle">Afterglow</div><div class="song-artist" id="nowArtist">Vera &amp; The Volts</div><div class="pill" id="eraPill">MASTER · AI RESTORED</div>
        <div class="timeline"><input id="seek" type="range" min="0" max="100" value="21" aria-label="Song progress"><div class="times"><span id="current">0:47</span><span id="total">3:42</span></div></div>
        <div class="era-row"><button class="era" data-era="VINYL">VINYL<small>1950S</small></button><button class="era" data-era="AM RADIO">AM RADIO<small>1960S</small></button><button class="era" data-era="CASSETTE">CASSETTE<small>1970S</small></button></div>
        <div class="eyebrow" style="margin-top:20px">TIME DOWN ↓</div>
      </section>
      <aside class="card library" id="library">
        <div class="library-head"><h2>Your music</h2><span class="count" id="count">4 songs</span></div>
        <div class="actions"><button class="action search" id="searchButton">⌕ SEARCH</button><button class="action" id="addButton">+ ADD SONGS</button></div>
        <input id="search" class="searchbar" type="search" placeholder="Search uploaded songs">
        <input id="files" type="file" accept="audio/*" multiple>
        <div class="songs" id="songs" aria-live="polite"></div>
        <div class="note">Upload your own or royalty-free recordings. Your music stays in this browser session.</div>
      </aside>
    </main>
  </div>
  <audio id="audio"></audio>
  <script>
    const songs = [
      { title:'Afterglow', artist:'Vera & The Volts', duration:'3:42' },
      { title:'Slow Motion Summer', artist:'The Canyon Lights', duration:'4:18' },
      { title:'Marigold', artist:'Roman Holiday Radio', duration:'3:14' },
      { title:'Dial Tone Dreams', artist:'Peach Static', duration:'4:01' }
    ];
    let selected = 0, activeEra = 'MASTER';
    const list = document.querySelector('#songs'), search = document.querySelector('#search'), audio = document.querySelector('#audio');
    const title = document.querySelector('#nowTitle'), artist = document.querySelector('#nowArtist'), total = document.querySelector('#total');
    function draw() {
      const query = search.value.toLowerCase();
      const visible = songs.map((song,index) => ({song,index})).filter(({song}) => (song.title + song.artist).toLowerCase().includes(query));
      list.innerHTML = visible.length ? visible.map(({song,index}) => `<button class="song ${index===selected?'selected':''}" data-index="${index}"><span class="art">♫</span><span><strong>${song.title}</strong><span>${song.artist}</span></span><time>${song.duration}</time></button>`).join('') : '<div class="empty">No matching songs.</div>';
      document.querySelector('#count').textContent = `${songs.length} ${songs.length===1?'song':'songs'}`;
    }
    function choose(index) { selected=index; const song=songs[index]; title.textContent=song.title; artist.textContent=song.artist; total.textContent=song.duration; document.querySelector('#seek').value=0; document.querySelector('#current').textContent='0:00'; if(song.url){ audio.src=song.url; } draw(); }
    draw();
    list.addEventListener('click', event => { const button=event.target.closest('.song'); if(button) choose(Number(button.dataset.index)); });
    document.querySelector('#searchButton').onclick = () => { search.classList.toggle('visible'); if(search.classList.contains('visible')) search.focus(); };
    search.oninput = draw;
    document.querySelector('#musicButton').onclick = () => document.querySelector('#library').scrollIntoView({behavior:'smooth',block:'start'});
    document.querySelector('#addButton').onclick = () => document.querySelector('#files').click();
    document.querySelector('#files').onchange = event => { [...event.target.files].forEach(file => songs.push({title:file.name.replace(/\.[^/.]+$/,''),artist:'Local upload',duration:'—',url:URL.createObjectURL(file)})); draw(); if(event.target.files.length) choose(songs.length-1); };
    document.querySelector('#play').onclick = () => { if(audio.src){ audio.paused ? audio.play() : audio.pause(); } else { document.querySelector('#record').classList.toggle('spinning'); } };
    audio.onplay = () => document.querySelector('#record').classList.add('spinning'); audio.onpause = () => document.querySelector('#record').classList.remove('spinning');
    document.querySelectorAll('.era').forEach(button => button.onclick = () => { document.querySelectorAll('.era').forEach(item => item.classList.remove('active')); button.classList.add('active'); activeEra=button.dataset.era; document.querySelector('#eraPill').textContent=`${activeEra} · PLAYBACK PHYSICS`; });
  </script>
</body>
</html>
